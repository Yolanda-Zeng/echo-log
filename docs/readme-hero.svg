<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1440 720" role="img" aria-labelledby="title desc">
  <title id="title">回响录 Echo Log 产品视觉概览</title>
  <desc id="desc">黑色背景上的三维专辑螺旋塔、评分卡片和音频播放界面</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0a0b0b"/><stop offset=".55" stop-color="#151817"/><stop offset="1" stop-color="#090a09"/></linearGradient>
    <linearGradient id="lime" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#d6ff84"/><stop offset="1" stop-color="#8dda27"/></linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ff7658"/><stop offset="1" stop-color="#6532aa"/></linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#90e9f1"/><stop offset="1" stop-color="#3156c8"/></linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffacc9"/><stop offset="1" stop-color="#ae314c"/></linearGradient>
    <radialGradient id="glow"><stop stop-color="#b7ff40" stop-opacity=".2"/><stop offset="1" stop-color="#b7ff40" stop-opacity="0"/></radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".55"/></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="35"/></filter>
    <pattern id="grain" width="80" height="80" patternUnits="userSpaceOnUse"><circle cx="3" cy="6" r=".7" fill="#fff" opacity=".05"/><circle cx="41" cy="25" r=".6" fill="#fff" opacity=".04"/><circle cx="69" cy="64" r=".8" fill="#fff" opacity=".03"/></pattern>
  </defs>
  <rect width="1440" height="720" rx="26" fill="url(#bg)"/>
  <circle cx="785" cy="370" r="390" fill="url(#glow)" filter="url(#soft)"/>
  <rect width="1440" height="720" rx="26" fill="url(#grain)"/>
  <g fill="#f1f0e9" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <g transform="translate(64 52)">
      <circle cx="8" cy="8" r="7" fill="#b7ff40"/><text x="27" y="16" font-size="24" font-weight="700" letter-spacing="2">回响录</text><text x="119" y="16" font-size="13" fill="#8b908b" letter-spacing="2">ECHO LOG</text>
    </g>
    <text x="64" y="163" font-size="15" fill="#b7ff40" letter-spacing="4">LISTENING ARCHIVE / 001—100</text>
    <text x="62" y="232" font-size="54" font-weight="700">散落的声音，</text>
    <text x="62" y="296" font-size="54" font-weight="700" font-style="italic" fill="url(#lime)">重新回响。</text>
    <text x="65" y="347" font-size="17" fill="#a7aba7">旋转、探索并打开一张唱片。</text>
    <text x="65" y="375" font-size="17" fill="#a7aba7">评分、短评与一段真实的声音，都在这里。</text>
  </g>
  <g transform="translate(700 20)" filter="url(#shadow)">
