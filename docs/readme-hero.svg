    <line x1="24" y1="148" x2="454" y2="148" stroke="#333834"/><text x="25" y="169" fill="#8f968f" font-size="10">03</text><text x="62" y="169" fill="#f1f0e9" font-size="12" font-weight="700">Afterimage</text><text x="425" y="169" fill="#8f968f" font-size="10">3:42</text>
  </g>
  <g transform="translate(1167 502)" font-family="Arial, 'Microsoft YaHei', sans-serif" filter="url(#shadow)">
    <rect width="205" height="141" rx="18" fill="#eef0e8"/>
    <text x="20" y="27" fill="#616761" font-size="9" letter-spacing="2">CRITICAL INDEX</text>
    <text x="19" y="62" fill="#151715" font-size="35" font-weight="700">8.7</text><text x="78" y="60" fill="#505650" font-size="12">综合评分</text>
    <circle cx="22" cy="88" r="4" fill="#f06554"/><text x="34" y="92" fill="#333" font-size="10">豆瓣音乐</text><rect x="112" y="86" width="72" height="4" rx="2" fill="#c9ccc5"/><rect x="112" y="86" width="61" height="4" rx="2" fill="#91c82f"/>
    <circle cx="22" cy="111" r="4" fill="#7259d8"/><text x="34" y="115" fill="#333" font-size="10">AOTY</text><rect x="112" y="109" width="72" height="4" rx="2" fill="#c9ccc5"/><rect x="112" y="109" width="65" height="4" rx="2" fill="#91c82f"/>
  </g>
  <g font-family="Arial" font-size="10" fill="#717771" letter-spacing="2"><text x="64" y="684">REACT · THREE.JS · EXPRESS · SQLITE</text><text x="1166" y="684">SHANGHAI / CN — 2026</text></g>
</svg>
