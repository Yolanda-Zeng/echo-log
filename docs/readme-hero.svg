    <ellipse cx="310" cy="352" rx="198" ry="306" fill="none" stroke="#fff" stroke-opacity=".06"/>
    <g transform="translate(230 58) rotate(-13)"><rect width="116" height="145" rx="4" fill="url(#pink)"/><circle cx="78" cy="48" r="28" fill="none" stroke="#fff" stroke-opacity=".35" stroke-width="2"/><text x="12" y="128" fill="#fff" font-family="Arial" font-size="10" font-weight="700">ARCHIVE 014</text></g>
    <g transform="translate(365 100) rotate(12)"><rect width="124" height="155" rx="4" fill="url(#cool)"/><path d="M12 106 Q62 22 112 106" fill="none" stroke="#fff" stroke-opacity=".55" stroke-width="3"/><text x="12" y="139" fill="#fff" font-family="Arial" font-size="10" font-weight="700">SOFT STATIC</text></g>
    <g transform="translate(98 167) rotate(-25)"><rect width="128" height="160" rx="4" fill="url(#warm)"/><circle cx="64" cy="68" r="36" fill="#191716" opacity=".62"/><circle cx="64" cy="68" r="10" fill="#f9c93a"/><text x="12" y="143" fill="#fff" font-family="Arial" font-size="10" font-weight="700">AFTERIMAGE</text></g>
    <g transform="translate(439 273) rotate(23)"><rect width="121" height="151" rx="4" fill="#e9e2cf"/><path d="M0 84 L121 26 V151 H0Z" fill="#d1a827"/><text x="12" y="21" fill="#222" font-family="Arial" font-size="10" font-weight="700">ECHO / 057</text></g>
    <g transform="translate(178 290) rotate(-5)"><rect width="156" height="195" rx="5" fill="#12191d" stroke="#b7ff40" stroke-width="2"/><circle cx="78" cy="75" r="48" fill="none" stroke="#b7ff40" stroke-opacity=".65" stroke-width="2"/><circle cx="78" cy="75" r="31" fill="none" stroke="#b7ff40" stroke-opacity=".45"/><circle cx="78" cy="75" r="10" fill="#b7ff40"/><text x="16" y="157" fill="#f2f4ed" font-family="Arial" font-size="16" font-weight="700">GLASS ROOMS</text><text x="16" y="176" fill="#8f968f" font-family="Arial" font-size="9">ECHO ARTIST</text></g>
    <g transform="translate(352 474) rotate(15)"><rect width="119" height="149" rx="4" fill="#f1a9be"/><path d="M16 15 H102 V134 H16Z" fill="none" stroke="#19382e" stroke-width="2"/><text x="25" y="82" fill="#19382e" font-family="Arial" font-size="15" font-weight="700">CHARM</text></g>
    <g transform="translate(65 425) rotate(-17)"><rect width="119" height="149" rx="4" fill="#224bcc"/><path d="M18 23 L100 126 M100 23 L18 126" stroke="#e9e4d6" stroke-width="3"/><text x="12" y="140" fill="#fff" font-family="Arial" font-size="9">ARCHIVE 082</text></g>
  </g>
  <g transform="translate(62 463)" font-family="Arial, 'Microsoft YaHei', sans-serif" filter="url(#shadow)">
